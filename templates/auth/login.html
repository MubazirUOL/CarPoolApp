{% extends 'base.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="auth-container">

    <form method="POST" class="auth-form">

        <h2>Login</h2>

        <input type="email"
               name="email"
               placeholder="Email Address"
               required>


        <input type="password"
               name="password"
               placeholder="Password"
               required>


        <button type="submit">
            Login
        </button>


        <p>
            Don't have an account?
            <a href="/register">Register</a>
        </p>

    </form>

</div>

{% endblock %}
