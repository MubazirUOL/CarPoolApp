{% extends 'base.html' %}

{% block title %}
Register
{% endblock %}

{% block content %}

<div class="auth-container">

    <form method="POST" class="auth-form">

        <h2>Create Account</h2>

        <input type="text"
               name="full_name"
               placeholder="Full Name"
               required>


        <input type="email"
               name="email"
               placeholder="Email Address"
               required>


        <input type="password"
               name="password"
               placeholder="Password"
               required>


        <button type="submit">
            Register
        </button>


        <p>
            Already have an account?
            <a href="/login">Login</a>
        </p>

    </form>

</div>

{% endblock %}
