{% extends 'base.html' %}

{% block title %}
Dashboard
{% endblock %}

{% block content %}

<div class="dashboard-container">

    <h1>
        Welcome {{ session['user_name'] }}
    </h1>

    <div class="dashboard-cards">

        <div class="card">
            <h2>Search Rides</h2>
            <p>Find nearby rides instantly.</p>
        </div>

        <div class="card">
            <h2>My Bookings</h2>
            <p>View your booked rides.</p>
        </div>

        <div class="card">
            <h2>Profile</h2>
            <p>Manage your account.</p>
        </div>

    </div>

</div>

{% endblock %}
