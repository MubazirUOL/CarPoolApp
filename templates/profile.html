{% extends 'base.html' %}

{% block title %}
Profile
{% endblock %}

{% block content %}

<div class="profile-container">

    <h1>User Profile</h1>

    <div class="profile-card">

        <p>
            <strong>Name:</strong>
            {{ user.full_name }}
        </p>

        <p>
            <strong>Email:</strong>
            {{ user.email }}
        </p>

        <p>
            <strong>Role:</strong>
            {{ user.role }}
        </p>

    </div>

</div>

{% endblock %}
